<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Note</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #191919;
        color: #e3e3e3;
      }

      .container {
        height: 100%;
        display: flex;
        flex-direction: column;
        border-top: 1px solid #2f2f2f;
      }

      textarea {
        flex: 1;
        width: 100%;
        border: 0;
        outline: none;
        resize: none;
        background: transparent;
        color: #e3e3e3;
        font-size: 16px;
        font-family: inherit;
        font-weight: 400;
        line-height: 1.5;
        padding: 16px;
      }

      textarea::placeholder {
        color: #4a4a4a;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <textarea id="quickInput" placeholder="Start typing…" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
    </div>

    <script src="./quick-note.js"></script>
  </body>
</html>
